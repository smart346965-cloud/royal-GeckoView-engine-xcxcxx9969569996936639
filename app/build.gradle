plugins {
    alias(libs.plugins.androidApplication)
}

android {
    namespace 'com.store.app'
    compileSdk 34 // المعيار الحديث للأداء

    // 👇 أضف هذا البلوك هنا لتفعيل BuildConfig
    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.store.app"
        minSdk 26 // متوافق تماماً مع محرك Royal Engine
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled true // تفعيل ضغط الكود للحصول على حجم صاروخي
            shrinkResources true // إزالة الموارد غير المستخدمة
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // 👇 استراتيجية تقليص الحجم الاحترافية
    splits {
        abi {
            enable true
            reset()
            include "arm64-v8a", "armeabi-v7a" // ندعم أهم المعماريات للمتجر
            universalApk false
        }
    }
}

// 👑 درع التوافقية: إجبار جاردل على استخدام نسخ مستقرة متوافقة مع SDK 34
configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.13.0'
        force 'androidx.core:core-ktx:1.13.0'
    }
}

dependencies {
    // 🛡️ مكتبات أندرويد الصافية والأساسية (مسحوبة بتناغم تام من TOML)
    implementation libs.appcompat
    implementation libs.material
    implementation libs.activity
    implementation libs.constraintlayout
    
    // 👇 إضافة الوحش الجديد
    implementation libs.geckoview
    
    // 🎨 مكتبة الـ Splash Screen الرسمية (لتنعيم الدخول في أندرويد 12+)
    implementation libs.androidx.core.splashscreen
    
    // 🔔 الإشعارات (جاهزة ومربوطة متى ما أردت تفعيلها)
    implementation libs.onesignal

    // 🧪 مكتبات الاختبار والتأكد من الجودة
    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
}
