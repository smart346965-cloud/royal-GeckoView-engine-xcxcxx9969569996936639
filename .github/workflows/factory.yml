name: Royal Cloud Factory 👑

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [build_app] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Prepare Keystore 👑
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > release-key.jks || true
          if [ ! -f "release-key.jks" ] || [ $(stat -c%s "release-key.jks") -lt 100 ]; then
            echo "⚠️ Keystone file corrupted or missing! Generating auto-key for build..."
            rm -f release-key.jks 
            keytool -genkeypair -v -keystore release-key.jks -storepass android -alias key0 -keypass android -keyalg RSA -keysize 2048 -validity 1000 -dname "CN=Royal, OU=Engine, O=Factory, L=City, S=State, C=US"
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=key0" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
          else
            echo "✅ Keystore verified!"
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Nexus Root Diagnostic 🔍
        run: |
          echo "========== BUILD.GRADLE CONTENT =========="
          cat build.gradle
          echo "========== GRADLE VERSION =========="
          ./gradlew --version

      - name: Run Dependency Report for Expert
        run: |
          ./gradlew app:dependencies --configuration releaseRuntimeClasspath > dependencies_report.txt
          cat dependencies_report.txt

      # 🔍 نظام الفحص الدقيق وحقن الحل السريع للكلاس المفقود
      - name: 🔍 High-Precision Lifecycle & Startup Diagnostic
        run: |
          echo "========================================================"
          echo "🔎 الفحص الدقيق: البحث عن كلاسات Lifecycle و Startup في المشروع..."
          echo "========================================================"
          
          # 1. البحث في تقرير الاعتماديات لمعرفة هل هناك تضارب في الإصدارات
          if grep -q "androidx.lifecycle:lifecycle-process" dependencies_report.txt; then
            echo "✅ مكتبة lifecycle-process متواجدة في شجرة الاعتماديات."
          else
            echo "❌ تحذير: مكتبة lifecycle-process مفقودة من شجرة الاعتماديات!"
          fi

          # 2. الحل السريع والمضمون: إنشاء ملف proguard يدوياً وحقنه في نظام البناء فوراً 
          # لإجبار Gradle على تثبيت الكلاس ومنع كراش الـ NoClassDefFoundError
          echo "⚙️ توليد وحقن ملف حماية الكلاسات يدوياً..."
          cat <<EOF > app/proguard-rules.pro
          -keep class androidx.lifecycle.ReportFragment { *; }
          -keep class androidx.lifecycle.ReportFragment\$* { *; }
          -keep class androidx.startup.** { *; }
          -keep public class * extends androidx.startup.Initializer
          EOF
          
          echo "✅ تم إنشاء وحقن ملف proguard-rules.pro بنجاح في مسار التطبيق."

      - name: Build Debug APK 👑
        run: |
          # إضافة clean لإجبار gradle على مسح أي كاش قديم وإعادة فحص الكلاسات من الصفر
          ./gradlew clean assembleDebug

      - name: Extract Real SHA256 Fingerprint 🔐
        id: cert_info
        run: |
          SHA256_HEX=$(keytool -list -v -keystore release-key.jks -storepass "${{ env.KEYSTORE_PASSWORD }}" -alias "${{ env.KEY_ALIAS }}" | grep "SHA256:" | awk '{print $2}')
          echo "PROP_SHA256=$SHA256_HEX" >> $GITHUB_ENV
          echo "========================================================"
          echo "🔥 الف مبروك! البصمة الحقيقية للتطبيق هي: $SHA256_HEX"
          echo "========================================================"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Royal-App-Final-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: All-Found-APKs
          path: |
            **/*.apk
            **/*.aab

      - name: Notify Nexus Worker with Real Data 🔔
        if: success()
        run: |
          curl -X POST "https://nexus-auth-manager.smart346965.workers.dev/build-webhook" \
          -H "Content-Type: application/json" \
          -d '{
            "uid": "${{ github.event.client_payload.uid }}",
            "status": "completed",
            "sha256": "${{ env.PROP_SHA256 }}",
            "apkUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "aabUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "boostScript": "<script src=\"https://cdn.nexusui.engine/v2/boost.js\" data-app-id=\"NX-${{ github.event.client_payload.uid }}\"></script>"
          }'
