name: Royal Cloud Factory 👑

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [build_app] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
          
      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Prepare Keystore 👑
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > release-key.jks || true
          if [ ! -f "release-key.jks" ] || [ $(stat -c%s "release-key.jks") -lt 100 ]; then
            echo "⚠️ Keystone file corrupted or missing! Generating auto-key for build..."
            rm -f release-key.jks 
            keytool -genkeypair -v -keystore release-key.jks -storepass android -alias key0 -keypass android -keyalg RSA -keysize 2048 -validity 1000 -dname "CN=Royal, OU=Engine, O=Factory, L=City, S=State, C=US"
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=key0" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
          else
            echo "✅ Keystore verified!"
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Nexus Root Diagnostic 🔍
        run: |
          echo "========== BUILD.GRADLE CONTENT =========="
          cat build.gradle
          echo "========== GRADLE VERSION =========="
          ./gradlew --version

      # ========================================================
      # 👑 Royal Crash Investigator
      # ========================================================

      - name: 🔍 Crash Investigation Report
        run: |
          echo "=============================="
          echo "1) Lifecycle"
          echo "=============================="
          ./gradlew app:dependencyInsight \
            --dependency androidx.lifecycle \
            --configuration debugRuntimeClasspath

          echo ""
          echo "=============================="
          echo "2) Startup"
          echo "=============================="
          ./gradlew app:dependencyInsight \
            --dependency androidx.startup \
            --configuration debugRuntimeClasspath

          echo ""
          echo "=============================="
          echo "3) Fragment"
          echo "=============================="
          ./gradlew app:dependencyInsight \
            --dependency androidx.fragment \
            --configuration debugRuntimeClasspath

          echo ""
          echo "=============================="
          echo "4) GeckoView"
          echo "=============================="
          ./gradlew app:dependencyInsight \
            --dependency org.mozilla.geckoview \
            --configuration debugRuntimeClasspath

      - name: 🔨 Build Debug APK
        run: ./gradlew clean assembleDebug

      - name: 🔬 APK Forensics
        run: |

          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)

          echo ""
          echo "========================================"
          echo "APK PATH"
          echo "========================================"
          echo "$APK"

          unzip -q "$APK" -d apk

          echo ""
          echo "========================================"
          echo "DEX FILES"
          echo "========================================"

          find apk -name "*.dex"

          echo ""
          echo "========================================"
          echo "SEARCH ReportFragment"
          echo "========================================"

          strings apk/*.dex | grep "ReportFragment" || true

          echo ""
          echo "========================================"
          echo "SEARCH ActivityInitializationListener"
          echo "========================================"

          strings apk/*.dex | grep "ActivityInitializationListener" || true

          echo ""
          echo "========================================"
          echo "SEARCH ProcessLifecycleInitializer"
          echo "========================================"

          strings apk/*.dex | grep "ProcessLifecycleInitializer" || true

          echo ""
          echo "========================================"
          echo "SEARCH InitializationProvider"
          echo "========================================"

          strings apk/*.dex | grep "InitializationProvider" || true

          echo ""
          echo "========================================"
          echo "AndroidManifest Providers"
          echo "========================================"

          strings apk/AndroidManifest.xml | grep "androidx.startup" || true

          echo ""
          echo "========================================"
          echo "RESULT"
          echo "========================================"

          if strings apk/*.dex | grep -q "ActivityInitializationListener"; then
            echo "✅ ActivityInitializationListener EXISTS"
          else
            echo "❌ ActivityInitializationListener MISSING"
          fi

          if strings apk/*.dex | grep -q "ReportFragment"; then
            echo "✅ ReportFragment EXISTS"
          else
            echo "❌ ReportFragment MISSING"
          fi

          if strings apk/*.dex | grep -q "ProcessLifecycleInitializer"; then
            echo "✅ ProcessLifecycleInitializer EXISTS"
          else
            echo "❌ ProcessLifecycleInitializer MISSING"
          fi

      # 🔐 استخراج بصمة الشهادة
      - name: Extract Real SHA256 Fingerprint 🔐
        id: cert_info
        run: |
          SHA256_HEX=$(keytool -list -v -keystore release-key.jks -storepass "${{ env.KEYSTORE_PASSWORD }}" -alias "${{ env.KEY_ALIAS }}" | grep "SHA256:" | awk '{print $2}')
          echo "PROP_SHA256=$SHA256_HEX" >> $GITHUB_ENV
          echo "========================================================"
          echo "🔥 الف مبروك! البصمة الحقيقية للتطبيق هي: $SHA256_HEX"
          echo "========================================================"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Royal-App-Final-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: All-Found-APKs
          path: |
            **/*.apk
            **/*.aab

      - name: Notify Nexus Worker with Real Data 🔔
        if: success()
        run: |
          curl -X POST "https://nexus-auth-manager.smart346965.workers.dev/build-webhook" \
          -H "Content-Type: application/json" \
          -d '{
            "uid": "${{ github.event.client_payload.uid }}",
            "status": "completed",
            "sha256": "${{ env.PROP_SHA256 }}",
            "apkUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "aabUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "boostScript": "<script src=\"https://cdn.nexusui.engine/v2/boost.js\" data-app-id=\"NX-${{ github.event.client_payload.uid }}\"></script>"
          }'
