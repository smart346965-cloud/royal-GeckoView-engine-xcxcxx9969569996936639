name: Royal Cloud Factory 👑

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [build_app] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
          
      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Prepare Keystore 👑
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > release-key.jks || true
          if [ ! -f "release-key.jks" ] || [ $(stat -c%s "release-key.jks") -lt 100 ]; then
            echo "⚠️ Keystone file corrupted or missing! Generating auto-key for build..."
            rm -f release-key.jks 
            keytool -genkeypair -v -keystore release-key.jks -storepass android -alias key0 -keypass android -keyalg RSA -keysize 2048 -validity 1000 -dname "CN=Royal, OU=Engine, O=Factory, L=City, S=State, C=US"
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=key0" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
          else
            echo "✅ Keystore verified!"
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Nexus Root Diagnostic 🔍
        run: |
          echo "========== BUILD.GRADLE CONTENT =========="
          cat build.gradle
          echo "========== GRADLE VERSION =========="
          ./gradlew --version

      # 📊 التقرير الأول: شجرة الاعتماديات الكاملة بدون قص
      - name: Run Full Dependency Report for Expert
        run: |
          ./gradlew app:dependencies --configuration releaseRuntimeClasspath > dependencies_report.txt
          cat dependencies_report.txt

      # 🔍 التقرير الثاني: التشخيص العميق والتحقيق في المكاتب (Dependency Insight)
      - name: 📊 Deep Dependency Insight Investigation
        run: |
          echo "========================================================"
          echo "🔎 1) INVESTIGATING LIFECYCLE DEPENDENCY INSIGHT..."
          echo "========================================================"
          ./gradlew app:dependencyInsight --dependency androidx.lifecycle --configuration releaseRuntimeClasspath || true
          
          echo "========================================================"
          echo "🔎 2) INVESTIGATING STARTUP DEPENDENCY INSIGHT..."
          echo "========================================================"
          ./gradlew app:dependencyInsight --dependency androidx.startup --configuration releaseRuntimeClasspath || true
          
          echo "========================================================"
          echo "🔎 3) INVESTIGATING FRAGMENT & GECKOVIEW SOURCE..."
          echo "========================================================"
          ./gradlew app:dependencyInsight --dependency androidx.fragment --configuration releaseRuntimeClasspath || true
          ./gradlew app:dependencyInsight --dependency org.mozilla.geckoview --configuration releaseRuntimeClasspath || true

      # ⚙️ خطوة حقن وقائية لملف proguard لضمان عدم التدخل الخارجي أثناء التجميع
      - name: ⚙️ Inject Strict ProGuard Rules
        run: |
          cat <<EOF > app/proguard-rules.pro
          -keep class androidx.lifecycle.ReportFragment { *; }
          -keep class androidx.lifecycle.ReportFragment\$* { *; }
          -keep class androidx.startup.** { *; }
          -keep public class * extends androidx.startup.Initializer
          EOF

      - name: Build Debug APK 👑
        run: |
          ./gradlew clean assembleDebug

      # 🔐 استخراج بصمة الشهادة
      - name: Extract Real SHA256 Fingerprint 🔐
        id: cert_info
        run: |
          SHA256_HEX=$(keytool -list -v -keystore release-key.jks -storepass "${{ env.KEYSTORE_PASSWORD }}" -alias "${{ env.KEY_ALIAS }}" | grep "SHA256:" | awk '{print $2}')
          echo "PROP_SHA256=$SHA256_HEX" >> $GITHUB_ENV
          echo "========================================================"
          echo "🔥 الف مبروك! البصمة الحقيقية للتطبيق هي: $SHA256_HEX"
          echo "========================================================"

      # 🛑 التقرير الثالث والأهم: تشريح الـ APK وفحص أحشاء كود الـ DEX (Ultimate Dex Investigation)
      - name: 🔬 Ultimate APK Dex & Class Investigation (The Truth Report)
        run: |
          echo "========================================================"
          echo "🔬 التحقيق الإمبراطوري: تشريح الـ APK للبحث عن الكلاس المفقود..."
          echo "========================================================"
          
          # تحديد مسار الـ APK الناتج بدقة
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ خطأ فادح: لم يتم العثور على ملف APK للتشريح!"
            exit 1
          fi
          
          echo "🎯 تم العثور على الـ APK في المسار: $APK_PATH"
          
          # تثبيت أدوات أندرويد للتشريح (توفير بيئة dexdump)
          sudo apt-get update && sudo apt-get install -y dalvik-exchange || true
          
          # استخراج كود الـ DEX والبحث الجنائي عن الكلاس الداخلي المطلوب بالملي
          echo "🔎 فحص محتويات الـ APK عبر unzip للتحقق الأولي..."
          unzip -l "$APK_PATH" | grep "classes" || true
          
          echo "--------------------------------------------------------"
          echo "🔍 الفحص الجنائي لـ ReportFragment داخل الـ DEX:"
          echo "--------------------------------------------------------"
          
          # دمج فحص الكلاس عبر البحث النصي الموسع في ملفات الـ DEX
          mkdir -p dex_extracted
          unzip -p "$APK_PATH" "classes*.dex" > dex_extracted/all_dex.dex || true
          
          if strings dex_extracted/all_dex.dex | grep -q "ReportFragment"; then
            echo "✅ كلاس ReportFragment متواجد ومسجل في ملفات الـ DEX!"
            
            echo "🔹 الكلاسات والروابط الداخلية المكتشفة لـ ReportFragment:"
            strings dex_extracted/all_dex.dex | grep "ReportFragment" || true
          else
            echo "❌ كارثة: كلاس ReportFragment غائب تماماً وغير موجود بالـ APK النهائي!"
          fi
          
          echo "========================================================"
          echo "🏁 انتهى تقرير التشريح الشامل. انسخ السجلات البرمجية للخبير الآن."
          echo "========================================================"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Royal-App-Final-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: All-Found-APKs
          path: |
            **/*.apk
            **/*.aab

      - name: Notify Nexus Worker with Real Data 🔔
        if: success()
        run: |
          curl -X POST "https://nexus-auth-manager.smart346965.workers.dev/build-webhook" \
          -H "Content-Type: application/json" \
          -d '{
            "uid": "${{ github.event.client_payload.uid }}",
            "status": "completed",
            "sha256": "${{ env.PROP_SHA256 }}",
            "apkUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "aabUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "boostScript": "<script src=\"https://cdn.nexusui.engine/v2/boost.js\" data-app-id=\"NX-${{ github.event.client_payload.uid }}\"></script>"
          }'
